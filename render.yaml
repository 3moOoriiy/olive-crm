services:
  - type: web
    name: olive-crm
    runtime: node
    buildCommand: |
      apt-get update && apt-get install -y chromium && npm install
    startCommand: node server.js
    envVars:
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: olive-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
